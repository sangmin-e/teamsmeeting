<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Microsoft login complete</title>
  </head>
  <body>
    <p>Microsoft 로그인을 완료하는 중입니다.</p>
    <script src="https://res.cdn.office.net/teams-js/2.34.0/js/MicrosoftTeams.min.js"></script>
    <script src="/config.js"></script>
    <script>
      const TEAMS_AUTH_POPUP_KEY = "teamsMeeting.teamsAuthPopup";
      const MSAL_CDN_URLS = [
        "https://alcdn.msauth.net/browser/2.38.4/js/msal-browser.min.js",
        "https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.4/lib/msal-browser.min.js",
        "https://unpkg.com/@azure/msal-browser@2.38.4/lib/msal-browser.min.js",
      ];

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.async = true;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error(`failed: ${src}`));
          document.head.appendChild(script);
        });
      }

      async function ensureMsalLoaded() {
        if (window.msal) {
          return;
        }

        for (const url of MSAL_CDN_URLS) {
          try {
            await loadScript(url);
            if (window.msal) {
              return;
            }
          } catch {
            // Try the next CDN.
          }
        }

        throw new Error("Microsoft 로그인 모듈을 불러오지 못했습니다. 잠시 후 다시 시도하세요.");
      }

      function getAppConfig() {
        const config = window.APP_CONFIG || {};
        return {
          tenant: (config.tenant || "organizations").trim(),
          clientId: (config.clientId || "").trim(),
        };
      }

      function buildAuthority() {
        const tenant = getAppConfig().tenant;
        return `https://login.microsoftonline.com/${tenant || "organizations"}`;
      }

      function isTeamsAuthFlow() {
        return sessionStorage.getItem(TEAMS_AUTH_POPUP_KEY) === "1";
      }

      async function initializeTeamsForPopup() {
        await Promise.race([
          microsoftTeams.app.initialize(),
          new Promise((_, reject) =>
            setTimeout(() => reject(new Error("Teams 로그인 창 초기화가 지연되었습니다.")), 5000),
          ),
        ]);
      }

      function notifyTeamsFailure(error) {
        if (window.microsoftTeams?.authentication) {
          microsoftTeams.authentication.notifyFailure(error.message || "login_failed");
          return;
        }

        document.body.innerHTML = `<p>${error.message || "Microsoft 로그인을 완료하지 못했습니다."}</p>`;
      }

      async function completeAuth() {
        try {
          await ensureMsalLoaded();

          const { clientId } = getAppConfig();
          const client = new window.msal.PublicClientApplication({
            auth: {
              clientId,
              authority: buildAuthority(),
              redirectUri: `${window.location.origin}/auth-end.html`,
            },
            cache: {
              cacheLocation: "localStorage",
              storeAuthStateInCookie: true,
            },
          });

          const result = await client.handleRedirectPromise();
          const account = result?.account || client.getAllAccounts()[0];

          if (!account) {
            throw new Error("로그인 계정을 확인하지 못했습니다.");
          }

          client.setActiveAccount(account);
          localStorage.setItem("teamsMeeting.lastAccount", account.username);

          if (!isTeamsAuthFlow()) {
            window.location.replace(window.location.origin);
            return;
          }

          let accessToken = result?.accessToken || "";
          let expiresOn = result?.expiresOn?.getTime?.() || 0;

          if (!accessToken) {
            const silent = await client.acquireTokenSilent({
              scopes: ["Calendars.Read"],
              account,
            });
            accessToken = silent.accessToken;
            expiresOn = silent.expiresOn?.getTime?.() || 0;
          }

          await initializeTeamsForPopup();
          sessionStorage.removeItem(TEAMS_AUTH_POPUP_KEY);
          microsoftTeams.authentication.notifySuccess(
            JSON.stringify({
              username: account.username,
              accessToken,
              expiresOn,
            }),
          );
        } catch (error) {
          notifyTeamsFailure(error);
        }
      }

      completeAuth();
    </script>
  </body>
</html>
