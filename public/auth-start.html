<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Microsoft login</title>
    <script>
      if (new URLSearchParams(window.location.search).get("teams") !== "1") {
        sessionStorage.clear();
        window.location.replace("/");
      }

      setTimeout(() => {
        if (new URLSearchParams(window.location.search).get("teams") !== "1") {
          window.location.href = "/";
        }
      }, 500);
    </script>
  </head>
  <body>
    <p>Microsoft 로그인을 시작하는 중입니다.</p>
    <script src="/config.js"></script>
    <script>
      const GRAPH_SCOPES = ["Calendars.Read"];
      const TEAMS_AUTH_POPUP_KEY = "teamsMeeting.teamsAuthPopup";
      const TEAMS_SDK_URL = "https://res.cdn.office.net/teams-js/2.34.0/js/MicrosoftTeams.min.js";
      const MSAL_CDN_URLS = [
        "https://alcdn.msauth.net/browser/2.38.4/js/msal-browser.min.js",
        "https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.4/lib/msal-browser.min.js",
        "https://unpkg.com/@azure/msal-browser@2.38.4/lib/msal-browser.min.js",
      ];

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.async = true;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error(`failed: ${src}`));
          document.head.appendChild(script);
        });
      }

      async function ensureMsalLoaded() {
        if (window.msal) {
          return;
        }

        for (const url of MSAL_CDN_URLS) {
          try {
            await loadScript(url);
            if (window.msal) {
              return;
            }
          } catch {
            // Try the next CDN.
          }
        }

        throw new Error("Microsoft 로그인 모듈을 불러오지 못했습니다. 잠시 후 다시 시도하세요.");
      }

      function getAppConfig() {
        const config = window.APP_CONFIG || {};
        return {
          tenant: (config.tenant || "organizations").trim(),
          clientId: (config.clientId || "").trim(),
        };
      }

      function buildAuthority() {
        const tenant = getAppConfig().tenant;
        return `https://login.microsoftonline.com/${tenant || "organizations"}`;
      }

      function isTeamsAuthFlow() {
        return new URLSearchParams(window.location.search).get("teams") === "1";
      }

      async function ensureTeamsLoaded() {
        if (!window.microsoftTeams) {
          await loadScript(TEAMS_SDK_URL);
        }
      }

      async function notifyTeamsFailure(error) {
        if (isTeamsAuthFlow()) {
          await ensureTeamsLoaded();
          microsoftTeams.authentication.notifyFailure(error.message || "login_failed");
          return;
        }

        document.body.innerHTML = `<p>${error.message || "Microsoft 로그인을 시작하지 못했습니다."}</p>`;
      }

      async function startAuth() {
        try {
          if (!isTeamsAuthFlow()) {
            sessionStorage.removeItem(TEAMS_AUTH_POPUP_KEY);
            window.location.replace(window.location.origin);
            return;
          }

          await ensureMsalLoaded();

          const { clientId } = getAppConfig();
          const redirectUri = `${window.location.origin}/auth-end.html`;

          sessionStorage.setItem(TEAMS_AUTH_POPUP_KEY, "1");

          const client = new window.msal.PublicClientApplication({
            auth: {
              clientId,
              authority: buildAuthority(),
              redirectUri,
            },
            cache: {
              cacheLocation: "localStorage",
              storeAuthStateInCookie: true,
            },
          });

          await client.loginRedirect({
            scopes: ["openid", "profile", ...GRAPH_SCOPES],
            prompt: "select_account",
            redirectStartPage: window.location.origin,
          });
        } catch (error) {
          await notifyTeamsFailure(error);
        }
      }

      startAuth();
    </script>
  </body>
</html>
