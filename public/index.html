<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teams Meeting Copier</title>
    <script>
      if (new URLSearchParams(window.location.search).get("reset") === "1") {
        localStorage.clear();
        sessionStorage.clear();
        if (window.caches) {
          caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key))));
        }
        window.location.replace("/");
      }
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hero card">
        <h1 class="hero-title">
          <svg class="hero-logo" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-label="Teams logo" role="img">
            <path stroke="currentColor" stroke-linejoin="round" d="M12.5 10h4a1 1 0 0 1 1 1v5.5a5 5 0 0 1-9.9 1" />
            <path stroke="currentColor" stroke-linejoin="round" d="M17.413 17.432A3.25 3.25 0 0 0 22.5 14.75v-3.861a0.889 0.889 0 0 0-0.889-0.889H16.89a0.89 0.89 0 0 0-0.189 0.02" />
            <path stroke="currentColor" stroke-linejoin="round" d="M17.5 6.25a1.75 1.75 0 1 0 3.5 0 1.75 1.75 0 1 0-3.5 0" />
            <path stroke="currentColor" d="M4.5 9.5h5" />
            <path stroke="currentColor" d="M7 9.5V15" />
            <path stroke="currentColor" d="M1.5 16.5v-9a1 1 0 0 1 1-1h9a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1h-9a1 1 0 0 1-1-1Z" />
            <path stroke="currentColor" stroke-linejoin="round" d="M12.5 7.5a2.5 2.5 0 1 0-2-1" />
          </svg>
          <span>TEAMS Meetings</span>
        </h1>
      </section>

      <section class="card">
        <h2>연결 설정</h2>
        <p class="meta">Microsoft 계정으로 로그인한 뒤 기간 조회를 실행하세요.</p>
        <div class="actions">
          <button id="signInBtn" class="btn secondary">Microsoft 로그인</button>
          <button id="signOutBtn" class="btn ghost">로그아웃</button>
        </div>
        <p id="accountInfo" class="meta"></p>
      </section>

      <section class="card">
        <h2>회의 조회</h2>
        <div class="date-grid">
          <div class="row">
            <label for="startDate">시작 일시</label>
            <input id="startDate" type="datetime-local" />
          </div>
          <div class="row">
            <label for="endDate">종료 일시</label>
            <input id="endDate" type="datetime-local" />
          </div>
        </div>
        <div class="actions">
          <button id="fetchBtn" class="btn primary">기간 조회</button>
          <button id="copySelectedBtn" class="btn secondary">선택 복사</button>
          <button id="copyAllBtn" class="btn ghost">전체 복사</button>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="card">
        <h2>조회 결과</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>선택</th>
                <th>주제</th>
                <th>일시</th>
                <th>링크</th>
                <th>동작</th>
              </tr>
            </thead>
            <tbody id="meetingRows"></tbody>
          </table>
        </div>
        <p id="emptyState" class="meta">조회 결과가 없습니다.</p>
      </section>

      <section class="card">
        <h2>복사 미리보기</h2>
        <div class="row">
          <label for="previewText">클립보드로 복사될 텍스트</label>
          <textarea id="previewText" placeholder="조회 후 선택 복사 또는 전체 복사를 누르세요."></textarea>
        </div>
      </section>
    </main>

    <script src="/config.js?v=authfix-20260625n"></script>
    <script src="/app.js?v=authfix-20260625n"></script>
  </body>
</html>
